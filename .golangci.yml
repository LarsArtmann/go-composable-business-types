version: 2

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocognit
    # - goconst  # Disabled: minor test string issues, readability over constants in tests
    - gocritic
    - gocyclo
    - gomoddirectives
    - gomodguard
    - gosec
    - interfacebloat
    - intrange
    - maintidx
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - unconvert
    - unparam
    - usetesting

linters-settings:
  cyclop:
    max-complexity: 25
  gocognit:
    min-complexity: 30
  gocyclo:
    min-complexity: 20
  gocritic:
    disabled-checks:
      - deprecatedComment

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Generated code
    - path: enums/enum_enum\.go
      linters:
        - all
    # Test functions with multiple SQL test cases
    - path: _test\.go
      linters:
        - gocyclo
        - cyclop
        - goconst
