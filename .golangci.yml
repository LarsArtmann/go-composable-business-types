version: "2"
run:
  timeout: 5m
  go: ""
  build-tags: []
  allow-parallel-runners: false
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - maintidx
    - protogetter
    - staticcheck
    - unused
    - gocognit
    - gomoddirectives
    - mirror
    - dupl
    - reassign
    - errchkjson
    - nilerr
    - prealloc
    - gochecknoinits
    - gochecksumtype
    - funlen
    - thelper
    - ineffassign
    - gocritic
    - errorlint
    - paralleltest
    - usetesting
    - gocyclo
    - govet
    - nakedret
    - exptostd
    - noctx
    - predeclared
    - bidichk
    - interfacebloat
    - spancheck
    - bodyclose
    - wastedassign
    - misspell
    - nolintlint
    - decorder
    - dupword
    - errname
    - perfsprint
    - containedctx
    - musttag
    - gochecknoglobals
    - nilnil
    - goconst
    - gosec
    - loggercheck
    - forcetypeassert
    - revive
    - zerologlint
    - iotamixing
    - sloglint
    - gocheckcompilerdirectives
    - unconvert
    - errcheck
    - sqlclosecheck
    - exhaustruct
    - gosmopolitan
    - gomodguard
    - rowserrcheck
    - depguard
    - intrange
    - ginkgolinter
    - nestif
    - nilnesserr
    - contextcheck
    - recvcheck
    - cyclop
    - durationcheck
    - dogsled
    - wrapcheck
    - testifylint
    - exhaustive
    - copyloopvar
    - modernize
    - unparam
  settings:
    cyclop:
      max-complexity: 20
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/larsartmann/go-composable-business-types/**
            - golang.org/x/text
            - github.com/bojanz/currency
            - github.com/sixafter/nanoid
          list-mode: lax
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15
formatters:
  enable:
    - gofmt
    - goimports
    - golines
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
