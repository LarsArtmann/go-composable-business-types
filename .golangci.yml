version: "2"
run:
  timeout: 5m
  go: ""
  build-tags: []
  allow-parallel-runners: false
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - loggercheck
    - paralleltest
    - exptostd
    - gocritic
    - gomoddirectives
    - prealloc
    - forcetypeassert
    - wastedassign
    - contextcheck
    - dogsled
    - errchkjson
    - gosec
    - nestif
    - sloglint
    - gochecknoglobals
    - nilnesserr
    - predeclared
    - musttag
    - gocognit
    - reassign
    - usetesting
    - durationcheck
    - interfacebloat
    - noctx
    - protogetter
    - unconvert
    - cyclop
    - nolintlint
    - funlen
    - ginkgolinter
    - wrapcheck
    - gocyclo
    - goconst
    - nilnil
    - bodyclose
    - decorder
    - gochecknoinits
    - perfsprint
    - mirror
    - bidichk
    - dupl
    - dupword
    - exhaustive
    - rowserrcheck
    - spancheck
    - zerologlint
    - exhaustruct
    - revive
    - copyloopvar
    - errorlint
    - gocheckcompilerdirectives
    - nilerr
    - gosmopolitan
    - recvcheck
    - testifylint
    - misspell
    - intrange
    - nakedret
    - thelper
    - maintidx
    - errname
    - sqlclosecheck
    - containedctx
    - gomodguard
    - unparam
    - gochecksumtype
formatters:
  enable:
    - golines
issues:
  max-issues-per-linter: 0
  max-same-issues: 5
  exclude-rules:
    # exhaustruct: Interface assertions and compile-time checks
    - linters:
        - exhaustruct
      text: "is missing fields"
      path: "(_test\\.go|id/id\\.go)$"

    # forcetypeassert: Safe type assertions in generic code
    - linters:
        - forcetypeassert
      text: "type assertion must be checked"
      path: "id/id\\.go$"

    # recvcheck: Mixed receivers are acceptable for types with both value and pointer methods
    - linters:
        - recvcheck
      text: "use pointer receiver and non-pointer receiver"

    # funlen: Complex generic type handlers are inherently verbose
    - linters:
        - funlen
      text: "has too many statements"
      path: "id/id\\.go$"

    # gochecknoglobals: Locale constants are intentional and compile-time validated
    - linters:
        - gochecknoglobals
      text: "is a global variable"
      path: "locale/locale\\.go$"

    # gosec G115: Integer conversions in serialization where overflow is handled
    - linters:
        - gosec
      text: "G115: integer overflow conversion"
      path: "id/id\\.go$"

    # nilnil: Sentinel errors for Value methods returning nil, nil for zero values
    - linters:
        - nilnil
      text: "return both a .nil. error and an invalid value"
      path: "(types/types\\.go|locale/locale\\.go|scanutil/scanutil\\.go)$"

    # revive: Stuttering names are acceptable for domain-specific types
    - linters:
        - revive
      text: "type name will be used by other packages, and that stutters"
      path: "(actor/actor\\.go|bound/bounded\\.go|money/money\\.go)$"

    # revive: Comments on private methods
    - linters:
        - revive
      text: "exported method.*should have comment or be unexported"
      path: "types/types\\.go$"

    # gosmopolitan: Test strings with unicode
    - linters:
        - gosmopolitan
      text: "contains rune in Han script"
      path: "id/id_test\\.go$"

    # musttag: JSON tags on internal types
    - linters:
        - musttag
      text: "should be annotated with the .json. tag"
      path: "datapoint/datapoint\\.go$"

    # goconst: Repeated strings in tests
    - linters:
        - goconst
      text: "has [0-9]+ occurrences, make it a constant"
      path: ".*_test\\.go$"
