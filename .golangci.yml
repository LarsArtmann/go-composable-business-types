version: "2"
run:
    timeout: 5m
    go: ""
    build-tags: []
    allow-parallel-runners: false
    allow-serial-runners: false
    issues-exit-code: 1
    tests: true
output:
    formats: {}
linters:
    enable:
        - loggercheck
        - paralleltest
        - exptostd
        - gocritic
        - gomoddirectives
        - prealloc
        - forcetypeassert
        - wastedassign
        - contextcheck
        - dogsled
        - errchkjson
        - gosec
        - nestif
        - sloglint
        - gochecknoglobals
        - nilnesserr
        - predeclared
        - musttag
        - gocognit
        - reassign
        - usetesting
        - durationcheck
        - interfacebloat
        - noctx
        - protogetter
        - unconvert
        - cyclop
        - nolintlint
        - funlen
        - ginkgolinter
        - wrapcheck
        - gocyclo
        - goconst
        - nilnil
        - bodyclose
        - decorder
        - gochecknoinits
        - perfsprint
        - mirror
        - bidichk
        - dupl
        - dupword
        - exhaustive
        - rowserrcheck
        - spancheck
        - zerologlint
        - exhaustruct
        - revive
        - copyloopvar
        - errorlint
        - gocheckcompilerdirectives
        - nilerr
        - gosmopolitan
        - recvcheck
        - testifylint
        - misspell
        - intrange
        - nakedret
        - thelper
        - maintidx
        - errname
        - sqlclosecheck
        - containedctx
        - gomodguard
        - unparam
        - gochecksumtype
formatters:
    enable:
        - golines
issues:
    max-issues-per-linter: 50
    max-same-issues: 10
