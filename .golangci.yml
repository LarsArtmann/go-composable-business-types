version: "2"
run:
  timeout: 5m
  go: ""
  build-tags: []
  allow-parallel-runners: false
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - err113
    - fatcontext
    - nonamedreturns
    - unused
    - misspell
    - gochecksumtype
    - interfacebloat
    - tagalign
    - perfsprint
    - gomodguard
    - nosprintfhostport
    - funcorder
    - gochecknoinits
    - contextcheck
    - containedctx
    - gochecknoglobals
    - varnamelen
    - goconst
    - dupword
    - revive
    - goprintffuncname
    - ineffassign
    - sqlclosecheck
    - depguard
    - canonicalheader
    - errorlint
    - godot
    - unparam
    - iface
    - modernize
    - makezero
    - mnd
    - testableexamples
    - godoclint
    - arangolint
    - gocyclo
    - decorder
    - bidichk
    - cyclop
    - promlinter
    - mirror
    - govet
    - forcetypeassert
    - goheader
    - gocognit
    - forbidigo
    - protogetter
    - unconvert
    - tparallel
    - copyloopvar
    - grouper
    - nilnesserr
    - exptostd
    - thelper
    - tagliatelle
    - godox
    - wsl_v5
    - asciicheck
    - gosmopolitan
    - inamedparam
    - zerologlint
    - gomoddirectives
    - errcheck
    - dogsled
    - gocheckcompilerdirectives
    - paralleltest
    - exhaustive
    - unqueryvet
    - reassign
    - wastedassign
    - exhaustruct
    - nilnil
    - nlreturn
    - intrange
    - predeclared
    - nolintlint
    - prealloc
    - usestdlibvars
    - rowserrcheck
    - testifylint
    - ireturn
    - staticcheck
    - bodyclose
    - wrapcheck
    - embeddedstructfieldcheck
    - gocritic
    - durationcheck
    - importas
    - noinlineerr
    - usetesting
    - dupl
    - nakedret
    - testpackage
    - asasalint
    - iotamixing
    - whitespace
    - spancheck
    - maintidx
    - errname
    - nestif
    - recvcheck
    - funlen
    - ginkgolinter
formatters:
  enable:
    - golines
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
