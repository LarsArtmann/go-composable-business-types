run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gomoddirectives
    - gomodguard
    - gosec
    - interfacebloat
    - intrange
    - maintidx
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - unconvert
    - unparam
    - usetesting

linters-settings:
  cyclop:
    max-complexity: 20
  depguard:
    rules:
      main:
        allow:
          - $gostd
          - github.com/larsartmann/go-composable-business-types/**
          - golang.org/x/text
          - github.com/bojanz/currency
          - github.com/sixafter/nanoid
        list-mode: lax
  gocognit:
    min-complexity: 30
  gocyclo:
    min-complexity: 15
  gocritic:
    disabled-checks:
      - deprecatedComment

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Generated code
    - path: enums/enum_enum\.go
      linters:
        - all
