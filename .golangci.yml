version: "2"
run:
  timeout: 5m
  go: 1.26.1
  build-tags: []
  allow-parallel-runners: false
  allow-serial-runners: false
  tests: true
  concurrency: 4
output:
  formats: {}
linters:
  enable:
    - bodyclose
    - gochecknoglobals
    - wrapcheck
    - reassign
    - exptostd
    - nakedret
    - goconst
    - decorder
    - exhaustive
    - mirror
    - recvcheck
    - nilnesserr
    - unconvert
    - rowserrcheck
    - noctx
    - bidichk
    - unparam
    - testifylint
    - usetesting
    - errname
    - copyloopvar
    - spancheck
    - errchkjson
    - ginkgolinter
    - gomoddirectives
    - interfacebloat
    - cyclop
    - containedctx
    - gomodguard
    - gocheckcompilerdirectives
    - loggercheck
    - exhaustruct
    - wastedassign
    - paralleltest
    - maintidx
    - thelper
    - contextcheck
    - nolintlint
    - gocritic
    - sloglint
    - zerologlint
    - misspell
    - perfsprint
    - intrange
    - nilerr
    - errorlint
    - musttag
    - durationcheck
    - predeclared
    - dupl
    - gocyclo
    - sqlclosecheck
    - nestif
    - protogetter
    - gocognit
    - funlen
    - forcetypeassert
    - gochecknoinits
    - dogsled
    - gosec
    - nilnil
    - gochecksumtype
    - prealloc
    - dupword
    - gosmopolitan
    - revive
  default: standard
  settings:
    cyclop:
      max-complexity: 40
formatters:
  enable:
    - golines
issues: {}
